version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: prodvideo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_2024
      MYSQL_DATABASE: prodvideo
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_pass_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: prodvideo-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: prodvideo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prodvideo-redis
    restart: unless-stopped
    command: redis-server --requirepass dev_redis_2024 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: prodvideo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: prodvideo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin2024;
      mc mb local/prodvideofactory --ignore-existing;
      mc anonymous set download local/prodvideofactory;
      echo 'MinIO bucket initialized';
      "

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: prodvideo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-db:
    image: postgres:16-alpine
    container_name: prodvideo-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:3.7
    container_name: prodvideo-kong-migration
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_dev_2024
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    restart: on-failure

  kong:
    image: kong:3.7
    container_name: prodvideo-kong
    restart: unless-stopped
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_dev_2024
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: prodvideo-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    container_name: prodvideo-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/file
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Application services (9 backends + 1 worker + 1 frontend)
  # ─────────────────────────────────────────────────────────────

  # YAML anchor: common env for all backend services
  x-backend-env: &backend-env
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_USER: dev_user
    MYSQL_PASSWORD: dev_pass_2024
    MYSQL_DATABASE: prodvideo
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    REDIS_PASSWORD: dev_redis_2024
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin2024
    MONGODB_HOST: mongodb
    MONGODB_PORT: "27017"
    MONGODB_DATABASE: prodvideo
    CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    CELERY_RESULT_BACKEND: redis://:dev_redis_2024@redis:6379/0
    INTERNAL_JWT_SECRET: dev-jwt-secret-prodvideofactory-2024
    NACOS_ENABLED: "false"
    VAULT_ENABLED: "false"
    CONTENT_SAFETY_ENABLED: "false"
    PROMETHEUS_METRICS_ENABLED: "true"
    OTEL_ENABLED: "true"
    OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317

  x-backend-depends: &backend-depends
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    minio:
      condition: service_healthy

  x-backend-healthcheck: &backend-healthcheck
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s

  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: mcp_gateway
        SERVICE_PORT: "8000"
    container_name: prodvideo-mcp-gateway
    restart: unless-stopped
    environment:
      <<: *backend-env
      MCP_MODE: sse
    depends_on: *backend-depends
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      <<: *backend-healthcheck

  crawl-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: crawl_scheduler
        SERVICE_PORT: "8001"
    container_name: prodvideo-crawl-scheduler
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      <<: *backend-healthcheck

  product-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: product_analyzer
        SERVICE_PORT: "8002"
    container_name: prodvideo-product-analyzer
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/healthz"]
      <<: *backend-healthcheck

  ai-generation:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: ai_generation
        SERVICE_PORT: "8003"
    container_name: prodvideo-ai-generation
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/healthz"]
      <<: *backend-healthcheck

  video-composer:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: video_composer
        SERVICE_PORT: "8004"
    container_name: prodvideo-video-composer
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/healthz"]
      <<: *backend-healthcheck

  publish-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: publish_dispatcher
        SERVICE_PORT: "8005"
    container_name: prodvideo-publish-dispatcher
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/healthz"]
      <<: *backend-healthcheck

  asset-manager:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: asset_manager
        SERVICE_PORT: "8006"
    container_name: prodvideo-asset-manager
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/healthz"]
      <<: *backend-healthcheck

  web-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: web_backend
        SERVICE_PORT: "8007"
    container_name: prodvideo-web-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/healthz"]
      <<: *backend-healthcheck

  pipeline-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_DIR: pipeline_orchestrator
        SERVICE_PORT: "8008"
    container_name: prodvideo-pipeline-orchestrator
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on: *backend-depends
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/healthz"]
      <<: *backend-healthcheck

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: prodvideo-celery-worker
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: prodvideo-frontend
    restart: unless-stopped
    depends_on:
      web-backend:
        condition: service_healthy
    ports:
      - "1001:80"

  # ─────────────────────────────────────────────────────────────
  # Observability stack (Prometheus + Grafana + Jaeger)
  # ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prodvideo-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: prodvideo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: prodvideo-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  kong_db_data:
  nacos_data:
  vault_data:
  prometheus_data:
  grafana_data:
