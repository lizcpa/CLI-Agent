global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "prodvideo-backends"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "mcp-gateway:8000"
          - "crawl-scheduler:8001"
          - "product-analyzer:8002"
          - "ai-generation:8003"
          - "video-composer:8004"
          - "publish-dispatcher:8005"
          - "asset-manager:8006"
          - "web-backend:8007"
          - "pipeline-orchestrator:8008"
